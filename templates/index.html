<!DOCTYPE html>
<html>
<head>
    <title>Employee Management</title>
</head>
<body>

<h1>Employee Management System</h1>

<form action="/add" method="POST">

    <input type="text"
           name="name"
           placeholder="Name"
           required>

    <input type="text"
           name="department"
           placeholder="Department"
           required>

    <input type="number"
           name="salary"
           placeholder="Salary"
           required>

    <button type="submit">
        Add Employee
    </button>

</form>

<hr>

<table border="1">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Department</th>
    <th>Salary</th>
    <th>Delete</th>
</tr>

{% for emp in employees %}

<tr>
    <td>{{ emp[0] }}</td>
    <td>{{ emp[1] }}</td>
    <td>{{ emp[2] }}</td>
    <td>{{ emp[3] }}</td>

    <td>
        <a href="/delete/{{ emp[0] }}">
            Delete
        </a>
    </td>
</tr>

{% endfor %}

</table>

</body>
</html>
